name: Docker_CI_pipeline_on_self-hosted_runner

on:
  push:

jobs:
  docker:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify Repository Files
        run: |
          pwd
          ls -la

      - name: Build Docker Image
        run: |
          docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/docker-ci-selfhosted-demo:latest" .

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/docker-ci-selfhosted-demo:latest"

      - name: Pull Docker Image
        run: |
          docker pull "${{ secrets.DOCKERHUB_USERNAME }}/docker-ci-selfhosted-demo:latest"

      - name: Run Docker Container
        run: |
          docker run -d --name docker-ci-container -p 80:80 "${{ secrets.DOCKERHUB_USERNAME }}/docker-ci-selfhosted-demo:latest"

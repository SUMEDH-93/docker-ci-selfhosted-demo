name: Docker_CI_pipeline_on_self-hosted_runner

on:
  push:

jobs:
  docker:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/docker-ci-selfhosted-demo:latest

      - name: Pull Docker Image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/docker-ci-selfhosted-demo:latest

      - name: Run Docker Container
        run: |
          docker run -d --name docker-ci-container -p 80:80 \
          ${{ secrets.DOCKERHUB_USERNAME }}/docker-ci-selfhosted-demo:latest
